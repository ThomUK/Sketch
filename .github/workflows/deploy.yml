name: Deploy to shinyapps.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install and deploy
        env:
          SHINYAPPSIO_ACCOUNT: ${{ secrets.SHINYAPPSIO_ACCOUNT }}
          SHINYAPPSIO_TOKEN:   ${{ secrets.SHINYAPPSIO_TOKEN }}
          SHINYAPPSIO_SECRET:  ${{ secrets.SHINYAPPSIO_SECRET }}
        run: |
          Rscript -e "rsconnect::setAccountInfo(name=${{secrets.SHINYAPPSIO_ACCOUNT}}, token=${{secrets.SHINYAPPSIO_TOKEN}}, secret=${{secrets.SHINYAPPSIO_SECRET}})"
          Rscript -e "rsconnect::deployApp(appName = 'sketch', appDir = '.', forceUpdate = TRUE)" 

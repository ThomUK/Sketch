name: Deploy to shinyapps.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        run: install.packages(c("shiny", "rsconnect"))
        shell: Rscript {0}

      - name: Deploy
        env:
          SHINYAPPSIO_ACCOUNT: ${{ secrets.SHINYAPPSIO_ACCOUNT }}
          SHINYAPPSIO_TOKEN:   ${{ secrets.SHINYAPPSIO_TOKEN }}
          SHINYAPPSIO_SECRET:  ${{ secrets.SHINYAPPSIO_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPSIO_ACCOUNT"),
            token  = Sys.getenv("SHINYAPPSIO_TOKEN"),
            secret = Sys.getenv("SHINYAPPSIO_SECRET")
          )
          rsconnect::deployApp(
            appDir      = ".",
            appName     = "sketch",
            forceUpdate = TRUE
          )
        shell: Rscript {0}

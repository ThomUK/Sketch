name: Deploy to shinyapps.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("shiny", "rsconnect"))'

      - name: Deploy
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPSIO_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPSIO_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPSIO_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPSIO_ACCOUNT"),
              token  = Sys.getenv("SHINYAPPSIO_TOKEN"),
              secret = Sys.getenv("SHINYAPPSIO_SECRET")
            )
            rsconnect::deployApp(
              appDir  = ".",
              appName = "sketch",
              forceUpdate = TRUE
            )
          '
